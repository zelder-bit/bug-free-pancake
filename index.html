<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Calc - Short for Calculator</title>
        <script src="javascript.js"></script>
        <meta name="viewport" content="device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="calculator">
                <div class="display">
                    <span class="solution"> 00000000000 </span>
                </div>
                <div class="lower-section">
                    <div class="numbers">
                            <div class="button-row">
                                <button>7</button>
                                <button>8</button>
                                <button>9</button>
                            </div>
                            <div class="button-row">
                                <button>4</button>
                                <button>5</button>
                                <button>6</button>
                            </div>
                            <div class="button-row">
                                <button>1</button>
                                <button>2</button>
                                <button>3</button>
                            </div>
                            <div class="button-row" id="last-row">
                                <button>0</button>
                                <button>.</button>
                                <button id="equals-button">=</button>
                            </div>
                    </div>
                    <div class="operators">
                        <button>+</button>
                        <button>-</button>
                        <button>X</button>
                        <button>/</button>
                        <button>CLEAR</button>
                    </div>
                </div>
            </div
        </div>
    </body>
</html>
